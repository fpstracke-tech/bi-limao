name: ETL Semanal — Preços + Containers

on:
  schedule:
    - cron: '0 9 * * 1'   # Toda segunda-feira às 06:00 BRT (09:00 UTC)
  workflow_dispatch:
    inputs:
      skip:
        description: 'ETLs para pular (ex: aschenberg europa)'
        required: false
        default: ''

jobs:
  etl-precos:
    name: Preços Brasil + Chile + Europa
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      contents: read

    env:
      SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
      HF_API_KEY:       ${{ secrets.HF_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: ETL Preços Brasil (HF Brasil)
        id: brasil
        run: python etl_hfbrasil.py

      - name: ETL Preços Chile (ODEPA)
        id: chile
        run: python pipeline_odepa_limon.py

      - name: Instalar Playwright (necessário para Europa)
        run: playwright install --with-deps chromium

      - name: ETL Preços Europa (FranceAgriMer)
        id: europa
        run: python etl_europa_franceagrimer.py

      - name: Resumo Preços
        if: always()
        run: |
          echo "Brasil:  ${{ steps.brasil.outcome }}"
          echo "Chile:   ${{ steps.chile.outcome }}"
          echo "Europa:  ${{ steps.europa.outcome }}"

      - name: Abrir issue em caso de falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const steps = {
              Brasil:  '${{ steps.brasil.outcome }}',
              Chile:   '${{ steps.chile.outcome }}',
              Europa:  '${{ steps.europa.outcome }}',
            };
            const failed = Object.entries(steps).filter(([,v]) => v === 'failure').map(([k]) => k);
            const title = `❌ Falha ETL Preços — ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC`;
            const body = [
              `**ETLs com falha:** ${failed.join(', ')}`,
              `**Workflow:** ${context.workflow}`,
              `**Run:** ${context.runId}`,
              `**Link:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Verifique os logs acima para identificar o problema.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['etl-falha', 'precos'],
            });

  etl-containers:
    name: Containers (Aschenberg)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      contents: read

    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
      ASCHENBERG_USER:   ${{ secrets.ASCHENBERG_USER }}
      ASCHENBERG_PASS:   ${{ secrets.ASCHENBERG_PASS }}
      PYTHONIOENCODING:  utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Instalar Playwright
        run: playwright install --with-deps chromium

      - name: ETL Containers (Aschenberg)
        id: aschenberg
        run: python etl_aschenberg_playwright.py

      - name: Abrir issue em caso de falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `❌ Falha ETL Containers — ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC`;
            const body = [
              `**Workflow:** ${context.workflow}`,
              `**Run:** ${context.runId}`,
              `**Link:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'O Aschenberg pode ter mudado a estrutura do DOM ou as credenciais expiraram.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['etl-falha', 'containers'],
            });
