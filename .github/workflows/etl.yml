name: ETL Semanal — BI Limão

on:
  schedule:
    - cron: '0 2 * * 1'   # toda segunda-feira às 02:00 UTC (23h domingo horário Brasília)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
      OWM_API_KEY:       ${{ secrets.OWM_API_KEY }}
      ASCHENBERG_USER:   ${{ secrets.ASCHENBERG_USER }}
      ASCHENBERG_PASS:   ${{ secrets.ASCHENBERG_PASS }}
      PYTHONIOENCODING:  utf-8

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install requests pandas openpyxl playwright

      - name: Instalar browsers Playwright
        run: playwright install --with-deps chromium

      - name: Rodar ETL master
        run: python etl_master.py

      - name: Notificar sucesso
        if: success()
        run: echo "ETL concluído com sucesso em $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Notificar falha
        if: failure()
        run: echo "ETL FALHOU — verificar logs acima"
