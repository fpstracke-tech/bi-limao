name: ETL Relatório Semanal — Email PDF

on:
  schedule:
    - cron: '0 10 * * 1'  # Toda segunda-feira às 07:00 BRT (10:00 UTC)
  workflow_dispatch:

jobs:
  relatorio:
    name: Gerar e Enviar Relatório PDF
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      contents: read

    env:
      SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
      RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install --upgrade pip && pip install requests reportlab resend

      - name: Gerar PDF e Enviar Email
        id: relatorio
        run: python etl_relatorio_semanal.py

      - name: Resumo
        if: always()
        run: echo "Relatório ${{ steps.relatorio.outcome }} — $(date -u '+%Y-%m-%d %H%M UTC')"

      - name: Abrir issue em caso de falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `❌ Falha Relatório Semanal — ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC`;
            const body = [
              `**Workflow:** ${context.workflow}`,
              `**Run:** ${context.runId}`,
              `**Link:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Possível causa: falha Resend API, Supabase fora do ar, ou erro de geração do PDF.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['etl-falha', 'relatorio'],
            });
